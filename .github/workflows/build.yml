name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifacts: |
              release/*.exe
          - os: macos-latest
            platform: mac
            artifacts: |
              release/*.dmg
          - os: ubuntu-latest
            platform: linux
            artifacts: |
              release/*.AppImage
              release/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.platform }} installers
        run: npm run dist:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts (workflow runs)
        uses: actions/upload-artifact@v4
        with:
          name: file-tree-generator-${{ matrix.platform }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error
