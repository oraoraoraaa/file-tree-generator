name: Release

# Build installers for Windows, macOS, and Linux and attach them to a GitHub
# Release. Triggered by pushing a version tag (e.g. `git tag v1.0.0 && git push --tags`),
# or manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifacts: |
              release/*.exe
          - os: macos-latest
            platform: mac
            artifacts: |
              release/*.dmg
          - os: ubuntu-latest
            platform: linux
            artifacts: |
              release/*.AppImage
              release/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.platform }} installers
        run: npm run dist:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Build unsigned artifacts (no code-signing certificates configured).
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts (workflow runs)
        uses: actions/upload-artifact@v4
        with:
          name: file-tree-generator-${{ matrix.platform }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
